services:
  catalog-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: catalog_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - catalog-db-data:/var/lib/postgresql/data
      - ./catalog-service/migrations:/docker-entrypoint-initdb.d
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  orders-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: orders_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - orders-db-data:/var/lib/postgresql/data
      - ./orders-service/migrations:/docker-entrypoint-initdb.d
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  catalog-service:
    build:
      context: .
      dockerfile: catalog-service/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:postgres@catalog-db:5432/catalog_db
      JWT_SECRET_KEY: supersecret-change-me
      PORT: "3001"
    ports:
      - "3001:3001"
    depends_on:
      catalog-db:
        condition: service_healthy

  orders-service:
    build:
      context: .
      dockerfile: orders-service/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:postgres@orders-db:5432/orders_db
      CATALOG_SERVICE_URL: http://catalog-service:3001
      JWT_SECRET_KEY: supersecret-change-me
      PORT: "3002"
    ports:
      - "3002:3002"
    depends_on:
      orders-db:
        condition: service_healthy
      catalog-service:
        condition: service_started

  admin-service:
    build:
      context: ./admin-service
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      ADMIN_EMAIL: admin@test.ru
      ADMIN_PASSWORD: admin123
      JWT_SECRET: supersecret-change-me
      CATALOG_URL: http://catalog-service:3001
      ORDERS_URL: http://orders-service:3002
      PORT: "3003"
    ports:
      - "3003:3003"
    depends_on:
      catalog-service:
        condition: service_started
      orders-service:
        condition: service_started

volumes:
  catalog-db-data:
  orders-db-data: